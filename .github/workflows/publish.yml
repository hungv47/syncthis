name: publish

# Auto-publish @hungv47/syncthis to npm via OIDC Trusted Publishing (no token),
# then tag + create a matching GitHub Release. Keeps npm, git tags, and Releases
# from drifting apart (they had — npm was at 0.9.x while Releases sat at v0.3.0).
#
# Maintainer flow: bump "version" in package.json -> commit -> push to main.
#
# CORRECTNESS comes from the registry guard, NOT the paths filter. The paths
# filter is a run-count optimization: it fires on ANY push touching package.json
# (incl. non-version edits), so an unrelated edit is a deliberate green no-op (the
# guard sees the version already on npm and skips; prepublishOnly never runs). A
# real version bump always touches package.json, so it always triggers.
#
# ONE-TIME SETUP (required before the first auto-publish): configure the npm
# Trusted Publisher at https://www.npmjs.com/package/@hungv47/syncthis/access
#   Organization or user = hungv47 | Repository = syncthis
#   Workflow filename = publish.yml (filename only) | Environment = (blank)
#   Allowed action = npm publish
# Do NOT add an NPM_TOKEN secret — OIDC needs none, and a stale token can shadow it.
on:
  push:
    branches: [main]
    paths:
      - package.json

# Serialize publish runs on main (queue, don't cancel) so two near-simultaneous
# package.json pushes can't both reach `npm publish` for the same version and turn
# the loser into a noisy 403 run. Defense-in-depth: the registry guard is what
# actually prevents a double-publish; this just avoids the red herring.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest # trusted publishing requires a GitHub-hosted runner
    permissions:
      contents: read
      id-token: write # mint the OIDC token npm exchanges (also enables provenance)
    outputs:
      published: ${{ steps.guard.outputs.publish }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      # Actions pinned to full commit SHAs (hardening for a credential-bearing job).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Bun first: prepublishOnly (bun test && bunx tsc --noEmit && bun scripts/build.ts)
      # runs as an npm lifecycle hook DURING `npm publish`, so bun must be on PATH.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned (not `latest`) to match the npm pin rationale: prepublishOnly runs
          # the bun toolchain on this id-token-bearing job, so don't float the binary.
          bun-version: 1.3.14

      # Install bundled devDeps so `bun build --target=node` can inline them into
      # dist/syncthis.mjs. --frozen-lockfile hard-fails if bun.lock drifts from
      # package.json (strict, reproducible; a version-only bump never changes it).
      - run: bun install --frozen-lockfile

      # Node 24 for the actual `npm publish` (OIDC handshake + provenance + upload).
      # registry-url wires the publish registry. Do NOT set a token env — OIDC must
      # be the sole auth path. Node 24 ships npm 11.x (>= 11.5.1 OIDC floor).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Floor check only — a no-op on Node 24 (npm 11.x already clears 11.5.1).
      # Upgrades ONLY if below the floor, pinned to 11.x (not @latest) to avoid
      # floating an unpinned package onto an id-token-bearing job.
      - name: Ensure npm meets the OIDC trusted-publishing floor (>= 11.5.1)
        run: |
          NPM_VER="$(npm -v)"
          if [ "$(printf '%s\n11.5.1\n' "$NPM_VER" | sort -V | head -n1)" != "11.5.1" ]; then
            echo "npm $NPM_VER is below 11.5.1 -- upgrading to npm@11."
            npm install -g npm@11
          else
            echo "npm $NPM_VER already meets the OIDC floor."
          fi

      - name: Read package version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # GUARD: publish only if this exact version is not already on the registry.
      # `npm view pkg@VER version` -> exit 0 + version when published; exit 1 + E404
      # when not. Verified empirically. Only an EXPLICIT E404 means "publish"; any
      # other non-zero exit (network/registry) fails loudly instead of guessing.
      - name: Check whether this version is already published
        id: guard
        env:
          # Bind via env (not direct ${{ }} interpolation into run:) — GitHub's
          # script-injection guidance, and consistent with the release job.
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          NAME="$(node -p "require('./package.json').name")"
          echo "Checking $NAME@$VERSION on the registry..."
          # GitHub Actions runs this under `bash -eo pipefail`. A bare assignment
          # `OUT=$(cmd)` aborts under set -e when cmd exits non-zero — and the E404
          # (exit 1) IS the publish-needed case. Capture status via `if` so errexit
          # doesn't kill the step before we classify the result.
          if OUT="$(npm view "$NAME@$VERSION" version 2>err.log)"; then STATUS=0; else STATUS=$?; fi
          ERR="$(cat err.log)"
          if [ "$STATUS" -eq 0 ] && [ -n "$OUT" ]; then
            echo "$NAME@$VERSION already on npm ($OUT) -- skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$ERR" | grep -qiE 'E404|No match found for version'; then
            echo "$NAME@$VERSION not on npm (E404) -- will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::npm view failed for a reason other than E404 (status $STATUS). Refusing to guess."
            echo "$ERR"
            exit 1
          fi

      # `npm publish` triggers prepublishOnly (bun test + tsc + build) automatically.
      # No --provenance flag: automatic under trusted publishing AND forced via
      # publishConfig.provenance=true. No --access flag: publishConfig.access=public.
      # No token: OIDC is the sole auth path.
      - name: Publish to npm
        if: steps.guard.outputs.publish == 'true'
        run: npm publish

  # Separate, least-privilege job: it holds contents:write (to tag + release) but
  # NOT id-token, so arbitrary devDep code never runs on a job that can both touch
  # the repo AND mint an npm credential. Runs only when publish actually happened.
  release:
    needs: publish
    if: needs.publish.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the git tag + GitHub Release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tag + GitHub Release (notes from CHANGELOG)
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          TAG="v$VERSION"
          # Idempotent: if the release already exists, do nothing.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists -- nothing to do."
            exit 0
          fi
          # Extract this version's CHANGELOG section as the release notes (index-based,
          # no regex escaping); fall back to a stub if the section is missing.
          NOTES="$(mktemp)"
          awk -v tag="## [$VERSION]" '
            index($0, tag)==1 {f=1; next}
            f && index($0,"## [")==1 {exit}
            f {print}
          ' CHANGELOG.md > "$NOTES"
          if [ ! -s "$NOTES" ]; then
            printf 'Release %s. See CHANGELOG.md.\n' "$TAG" > "$NOTES"
          fi
          # Idempotent: push the tag only if the remote doesn't already have it. A
          # re-run after a partial failure (tag pushed, but `gh release create` then
          # failed) would otherwise die on a rejected duplicate tag push — instead it
          # falls straight through to create the Release against the existing tag.
          # `git ls-remote --exit-code` queries the remote directly (exit 0 = present,
          # 2 = absent), independent of the shallow checkout's local tags.
          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" --verify-tag --title "$TAG" --notes-file "$NOTES" --latest
